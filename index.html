<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sorteos MU</title>

<link rel="stylesheet" href="assets/style.css">

<style>
#appRoot{position:relative;z-index:2;}
#appGlass{position:fixed;inset:0;z-index:0;pointer-events:none;}

.titlebar{
z-index:9999;
-webkit-app-region:drag;
display:flex;
justify-content:space-between;
align-items:center;
height:34px;
padding:0 10px;
}

.titlebar-right{
display:flex;
align-items:center;
gap:10px;
}

.no-drag{
-webkit-app-region:no-drag;
}

body{color:#fff;}
</style>
</head>

<body>

<div id="debugIndicator" class="debug-indicator hidden">
DEBUG MODE
</div>

<!-- ================= TITLEBAR ================= -->
<div class="titlebar">

<div class="titlebar-left">
<span data-i18n="app_title"></span>
</div>

<div class="titlebar-right">

  <!-- LANGUAGE -->
  <div class="language-dropdown no-drag">

    <div id="langSelected" class="lang-selected">
      <img id="langFlag" src="assets/es.png">
      <span id="langCode">ES</span>
    </div>

    <div id="langOptions" class="lang-options hidden">

  <div class="lang-option" data-lang="es">
    <img src="assets/es.png"> ES
  </div>

  <div class="lang-option" data-lang="en">
    <img src="assets/en.png"> EN
  </div>

  <div class="lang-option" data-lang="pl">
    <img src="assets/pl.png"> PL
  </div>

  <div class="lang-option" data-lang="br">
    <img src="assets/br.png"> BR
  </div>

  <div class="lang-option" data-lang="vi">
    <img src="assets/vi.png"> VI
  </div>

  <div class="lang-option" data-lang="zh">
    <img src="assets/zh.png"> ZH
  </div>

</div>

  </div>

  
  <button id="liveBtn" class="header-btn live-idle no-drag">
  <span class="live-dot"></span> <span data-i18n="live"></span>
</button>
  <button id="announceBtn" class="header-btn announce-btn no-drag">
  🎁 <span data-i18n="announce_giveaway"></span>
</button>

  <!-- STREAM MODE -->
  <button id="streamModeBtn"
          class="stream-toggle no-drag">
    🖥 <span data-i18n="normal_mode">Normal Mode</span>
  </button>

  <!-- SETTINGS -->
  <button id="openSettingsBtn"
          class="settings-btn no-drag">
    ⚙
  </button>

  <!-- WINDOW BUTTONS -->
  <div class="titlebar-controls no-drag">
    <button id="minBtn">—</button>
    <button id="closeBtn">✕</button>
  </div>

</div>
</div>

<div id="appGlass"></div>

<div id="appRoot">

<!-- ================= MAIN ================= -->
<div id="mainView" class="view active">

<div class="layout">

<div class="left-panel">

<div class="panel-block main-block">

<div class="panel-title centered-title">

<div class="title-center">
<span data-i18n="participants">Participantes</span>
<div class="participants-badge">
<span id="count">0</span>
</div>
</div>

</div>

<div id="participants" class="participants-list"></div>

</div>

<div class="panel-block draw-block">

<div class="draw-header">
<button id="drawBtn"
class="primary-btn"
data-i18n="draw">
Sortear
</button>

<button id="resetDrawBtn"
class="secondary-btn reset-btn"
data-i18n="new_draw">
Nuevo sorteo
</button>
</div>

<div class="roulette-container">
<div id="rouletteTrack"
class="roulette-track"></div>
</div>

</div>

</div>

<!-- RIGHT -->
<div class="right-panel">

<div class="panel-block history-section">
<div class="panel-title">
<span data-i18n="history">
Historial
</span>
</div>

<div id="history"
class="history-list"></div>
</div>

<button id="clearHistoryBtn"
class="secondary-btn"
data-i18n="clear_history">
Limpiar historial
</button>

<div class="panel-divider"></div>

<div class="panel-block awards-section">
<div class="panel-title">
<span data-i18n="available_prizes">
Premios Disponibles
</span>
</div>

<div id="awards"
class="awards-list"></div>
</div>

</div>

</div>
</div>


<!-- ================= SETTINGS ================= -->
<div id="settingsView" class="view">

<div class="settings-container">

<div class="settings-header">
<h2 data-i18n="settings">Configuración</h2>
</div>

<div class="settings-form">

<!-- ================= TWITCH ================= -->

<div class="settings-section">

<h3>Twitch</h3>

<div class="form-group oauth">
<label>OAuth Twitch</label>
<div class="password-wrapper">
<input id="oauthInput" type="password">
<button type="button" class="toggle-password" data-target="oauthInput">👁</button>
</div>
</div>

<div class="form-group">
<label>Canal Twitch</label>
<input id="channelInput" type="text">
</div>

<div class="form-group">
<label>Comando</label>
<input id="commandInput" type="text">
</div>

<div class="form-group">
<label>DV</label>
<div class="password-wrapper">
<input id="dvInput" type="password">
<button type="button" class="toggle-password" data-target="dvInput">👁</button>
</div>
</div>

<div class="form-group">
<label>API Key</label>
<div class="password-wrapper">
<input id="apiKeyInput" type="password">
<button type="button" class="toggle-password" data-target="apiKeyInput">👁</button>
</div>
</div>

<div class="settings-test-section">

<button id="testTwitch" class="secondary-btn">
<span data-i18n="test_twitch">Probar API Twitch</span>
</button>

<button id="testMu" class="secondary-btn">
<span data-i18n="test_mu">Probar API MU</span>
</button>

<div id="apiStatus" class="api-status"></div>

</div>

</div>

<!-- ================= DISCORD ================= -->

<div class="settings-section">

<h3>Discord</h3>

<div class="form-group discord-live">
<label>Discord Webhook (Live)</label>
<input id="discordLiveWebhookInput" type="text">
</div>

<div class="form-group discord-prize">
<label>Discord Webhook (Premios)</label>
<input id="discordPrizeWebhookInput" type="text">
</div>

</div>

<!-- ================= THEME ================= -->

<div class="settings-section">

<h3 data-i18n="theme"></h3>

<div class="theme-editor">

<div class="theme-toggle" onclick="toggleThemeEditor()">
<span data-i18n="theme_editor"></span> ▾
</div>

<div id="themeEditorContent" class="hidden">

<div class="theme-row">
<label data-i18n="theme_accent"></label>
<input type="color" id="themeAccent">
</div>

<div class="theme-row">
<label data-i18n="theme_background"></label>
<input type="color" id="themeBackground">
</div>

<div class="theme-row">
<label data-i18n="theme_panel"></label>
<input type="color" id="themePanel">
</div>

<div class="theme-row">
<label data-i18n="theme_text"></label>
<input type="color" id="themeText">
</div>

<div class="theme-row">
<label data-i18n="theme_highlight"></label>
<input type="color" id="themeHighlight">
</div>

<div class="theme-presets">

<button onclick="applyPresetTheme('cyberpunk')" data-i18n="preset_cyberpunk">Cyberpunk</button>
<button onclick="applyPresetTheme('gold')" data-i18n="preset_gold">Gold</button>
<button onclick="applyPresetTheme('emerald')" data-i18n="preset_emerald">Emerald</button>
<button onclick="applyPresetTheme('ruby')" data-i18n="preset_ruby">Ruby</button>
<button onclick="applyPresetTheme('ocean')" data-i18n="preset_ocean">Ocean</button>
<button onclick="applyPresetTheme('neon')" data-i18n="preset_neon">Neon</button>
<button onclick="applyPresetTheme('solar')" data-i18n="preset_solar">Solar</button>
<button onclick="applyPresetTheme('matrix')" data-i18n="preset_matrix">Matrix</button>
<button onclick="applyPresetTheme('sunset')" data-i18n="preset_sunset">Sunset</button>
<button onclick="applyPresetTheme('midnight')" data-i18n="preset_midnight">Midnight</button>
<button onclick="applyPresetTheme('sakura')" data-i18n="preset_sakura">Sakura</button>
<button onclick="applyPresetTheme('ice')" data-i18n="preset_ice">Ice</button>

</div>

</div>

</div>

</div>

<div class="settings-actions">

<button id="saveSettingsBtn" class="primary-btn">
Guardar
</button>

<button id="backBtn" class="secondary-btn">
Volver
</button>

</div>

</div>
</div>
</div>

<!-- WINNER -->
<div id="winnerScreen"
class="winner-screen hidden">
<canvas id="confettiCanvas"></canvas>
<div id="winnerName"></div>
</div>

<div class="watermark">
Made by - josethemou
</div>

<!-- ================= <span data-i18n="debug_panel"></span> ================= -->
<div id="debugPanel" class="debug-panel hidden">

  <div class="debug-header">
    <span data-i18n="debug_panel"></span>
  </div>

  <div class="debug-body">
 
    <button id="resetCooldownBtn" class="secondary-btn">
      <span data-i18n="reset_discord"></span>
    </button>

    <button id="addDebugUserBtn" class="secondary-btn">
      <span data-i18n="add_debug_user"></span>
    </button>

    <button id="generateFakeUsersBtn" class="secondary-btn">
      <span data-i18n="generate_fake_users"></span>
    </button>
  </div>

</div>

<script src="renderer.js"></script>

</div>
</body>
</html>
